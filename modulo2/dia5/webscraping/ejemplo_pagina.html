<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Demo Web Scraping</title>
    <style>
        .producto {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
            width: 250px;
            display: inline-block;
            vertical-align: top;
        }
        .nombre {
            margin: 0 0 10px 0;
            color: #333;
        }
        .precio {
            font-weight: bold;
            color: #007bff;
        }
        .stock {
            font-style: italic;
            color: #28a745;
        }
    </style>
</head>
<body>

    <h1 id="titulo-principal">Listado de Productos</h1>

    <div class="producto">
        <h2 class="nombre">Laptop HP</h2>
        <p class="precio">Precio: $1200</p>
        <p class="stock">Stock: Disponible</p>
    </div>

    <div class="producto">
        <h2 class="nombre">Mouse Logitech</h2>
        <p class="precio">Precio: $25</p>
        <p class="stock">Stock: Agotado</p>
    </div>

    <div class="producto">
        <h2 class="nombre">Teclado Mecánico</h2>
        <p class="precio">Precio: $80</p>
        <p class="stock">Stock: Disponible</p>
    </div>

    <a href="https://ejemplo.com" class="link">Ver más productos</a>

</body>
</html>
